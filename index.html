<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Strava Mini Pro</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white;text-align:center}
.container{background:white;color:black;margin:10px auto;padding:10px;border-radius:12px;width:92%;max-width:520px}
button{width:100%;padding:10px;margin:5px 0;border-radius:10px;border:none;background:#2563eb;color:white;font-weight:bold}
#map{height:320px;border-radius:10px}
small{display:block;margin-top:5px}
</style>
</head>

<body>

<header>🏃 Strava Mini Pro</header>

<div id="hostLogin" class="container">
  <h3>Start</h3>
  <button onclick="enter('HOST')">👑 Host</button>
  <button onclick="enter('GUEST')">👤 Guest</button>
</div>

<div id="app" style="display:none">

<div class="container">
<h3 id="user"></h3>

<button onclick="startRun()">Start løp</button>
<button onclick="stopRun()">Stopp</button>

<button onclick="enableRoute()">🏁 Lag rute</button>
<button onclick="disableRoute()">❌ Stopp rute</button>
<button onclick="saveRoute()">💾 Lagre rute</button>

<button onclick="saveGhost()">👻 Ghost</button>
<button onclick="startGhost()">▶ Ghost start</button>

<small id="stats">0</small>
</div>

<div class="container">
<div id="map"></div>
</div>

<div class="container">
<h3>Leaderboard</h3>
<ul id="board"></ul>
</div>

</div>

<script>

// ---------------- STATE ----------------
let map;
let user;

let watchId = null;
let startTime = 0;

let path = [];
let route = [];
let routeLine = null;
let routeHandler = null;

let distance = 0;
let lastPos = null;

let ghost = [];
let ghostMarker;
let ghostIndex = 0;
let ghostTimer;

// ---------------- APP ----------------
function enter(type){
  user = type;
  document.getElementById("hostLogin").style.display="none";
  document.getElementById("app").style.display="block";
  document.getElementById("user").innerText = type;
  setTimeout(initMap,200);
}

// ---------------- MAP ----------------
function initMap(){
  map = L.map('map').setView([63.11, 7.73], 13);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
}

// ---------------- RUN ----------------
function startRun(){
  path = [];
  distance = 0;
  lastPos = null;
  startTime = Date.now();

  if(watchId) navigator.geolocation.clearWatch(watchId);

  watchId = navigator.geolocation.watchPosition(p => {

    let pos = [p.coords.latitude, p.coords.longitude];
    path.push(pos);

    if(lastPos){
      distance += getDistance(lastPos,pos);
    }

    lastPos = pos;
    updateStats();

  }, err => console.log(err), {enableHighAccuracy:true});
}

function stopRun(){
  navigator.geolocation.clearWatch(watchId);

  let runs = JSON.parse(localStorage.getItem("runs")||"[]");

  runs.push({
    user,
    time: Date.now()-startTime,
    distance
  });

  localStorage.setItem("runs", JSON.stringify(runs));

  renderBoard();
}

// ---------------- ROUTE ----------------
function enableRoute(){
  map.off("click");

  routeHandler = e => {
    route.push([e.latlng.lat,e.latlng.lng]);

    if(routeLine) map.removeLayer(routeLine);

    routeLine = L.polyline(route,{color:"blue"}).addTo(map);
  };

  map.on("click", routeHandler);
}

function disableRoute(){
  map.off("click", routeHandler);
}

// ---------------- SAVE ROUTE ----------------
function saveRoute(){
  localStorage.setItem("route", JSON.stringify(route));
  alert("Saved!");
}

// ---------------- GHOST ----------------
function saveGhost(){
  localStorage.setItem("ghost", JSON.stringify(path));
}

function startGhost(){
  ghost = JSON.parse(localStorage.getItem("ghost")||"[]");

  if(ghostMarker) map.removeLayer(ghostMarker);

  ghostIndex = 0;
  ghostMarker = L.marker(ghost[0]).addTo(map);

  clearInterval(ghostTimer);

  ghostTimer = setInterval(()=>{
    if(ghostIndex < ghost.length){
      ghostMarker.setLatLng(ghost[ghostIndex++]);
    }
  },500);
}

// ---------------- BOARD ----------------
function renderBoard(){
  let runs = JSON.parse(localStorage.getItem("runs")||"[]");

  runs.sort((a,b)=>a.time-b.time);

  document.getElementById("board").innerHTML =
    runs.map((r,i)=>`
      <li>${i+1}. ${r.user} ${(r.time/1000).toFixed(1)}s ${(r.distance/1000).toFixed(2)}km</li>
    `).join("");
}

// ---------------- STATS ----------------
function updateStats(){
  let km = distance/1000;
  let min = (Date.now()-startTime)/60000;
  let pace = km ? (min/km).toFixed(2) : 0;

  document.getElementById("stats").innerText =
    `Pace ${pace} min/km | ${km.toFixed(2)} km`;
}

// ---------------- DISTANCE ----------------
function getDistance(a,b){
  const R=6371e3;
  const toRad=x=>x*Math.PI/180;

  let dLat=toRad(b[0]-a[0]);
  let dLon=toRad(b[1]-a[1]);

  let x=Math.sin(dLat/2)**2+
        Math.cos(toRad(a[0]))*
        Math.cos(toRad(b[0]))*
        Math.sin(dLon/2)**2;

  return 2*R*Math.asin(Math.sqrt(x));
}

// ---------------- INIT ----------------
window.onload=()=>{
  renderBoard();
};

</script>

</body>
</html>
