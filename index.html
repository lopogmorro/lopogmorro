<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Løp og Morro</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white;text-align:center}
.container{background:white;color:black;margin:10px auto;padding:10px;border-radius:12px;width:92%;max-width:520px}
button{width:100%;padding:10px;margin:5px 0;border-radius:10px;border:none;background:#2563eb;color:white;font-weight:bold}
#map{height:320px;border-radius:10px}
</style>
</head>

<body>

<header>🏃 Løp og Morro</header>

<div id="login" class="container">
  <h3>Start</h3>
  <button onclick="enter('HOST')">👑 Host</button>
  <button onclick="enter('GUEST')">👤 Guest</button>
</div>

<div id="app" style="display:none">

<div class="container">
<h3 id="user"></h3>

<button onclick="startRun()">Start løp</button>
<button onclick="stopRun()">Stopp</button>

<button class="route-btn" onclick="enableRoute()">🏁 Lag rute</button>
<button class="route-btn" onclick="disableRoute()">❌ Stopp rute</button>
<button class="route-btn" onclick="saveRoute()">💾 Lag løp</button>

<button onclick="joinRace()">🏃 Meld meg på</button>

<small id="stats">0</small>
</div>

<div class="container">
<div id="map"></div>
</div>

<div class="container">
<h3>Deltakere</h3>
<ul id="participants"></ul>
</div>

</div>

<script>

// -------- STATE --------
let map, user, isHost=false;
let watchId=null, startTime=0;
let path=[], route=[], routeLine=null, routeHandler=null;
let distance=0, lastPos=null;

// -------- LOGIN --------
function enter(type){

  if(type==="HOST"){
    let kode = prompt("Host kode:");
    if(kode!=="løp og morro") return alert("Feil kode!");
    isHost=true;
    user="HOST";
  } else {
    user="GUEST";
  }

  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
  document.getElementById("user").innerText=user;

  setTimeout(()=>{
    initMap();
    toggleRouteButtons();
    renderParticipants();
  },200);
}

// -------- MAP --------
function initMap(){
  map = L.map('map').setView([63.11,7.73],13);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

  let race = JSON.parse(localStorage.getItem("race"));
  if(race && race.route.length){
    L.polyline(race.route,{color:"red"}).addTo(map);
  }
}

// -------- RUN --------
function startRun(){
  path=[]; distance=0; lastPos=null; startTime=Date.now();

  watchId = navigator.geolocation.watchPosition(p=>{
    let pos=[p.coords.latitude,p.coords.longitude];
    path.push(pos);

    if(lastPos) distance+=getDistance(lastPos,pos);
    lastPos=pos;

    updateStats();
  });
}

function stopRun(){
  navigator.geolocation.clearWatch(watchId);
}

// -------- ROUTE (HOST ONLY) --------
function toggleRouteButtons(){
  if(!isHost){
    document.querySelectorAll(".route-btn").forEach(b=>b.style.display="none");
  }
}

function enableRoute(){
  if(!isHost) return alert("Kun host!");

  route=[];
  map.on("click", routeHandler = e=>{
    route.push([e.latlng.lat,e.latlng.lng]);
    if(routeLine) map.removeLayer(routeLine);
    routeLine=L.polyline(route,{color:"blue"}).addTo(map);
  });
}

function disableRoute(){
  map.off("click", routeHandler);
}

function saveRoute(){
  if(!isHost) return;

  let name = prompt("Navn på løpet:");

  let race = {name, route};
  localStorage.setItem("race", JSON.stringify(race));
  localStorage.setItem("participants", JSON.stringify([]));

  alert("Løp laget!");
}

// -------- JOIN --------
function joinRace(){
  let race = JSON.parse(localStorage.getItem("race"));
  if(!race) return alert("Ingen løp!");

  let list = JSON.parse(localStorage.getItem("participants")||"[]");

  if(!list.includes(user)){
    list.push(user);
    localStorage.setItem("participants", JSON.stringify(list));
  }

  renderParticipants();
}

// -------- PARTICIPANTS --------
function renderParticipants(){
  let list = JSON.parse(localStorage.getItem("participants")||"[]");

  document.getElementById("participants").innerHTML =
    list.map(p=>`<li>${p}</li>`).join("");
}

// -------- STATS --------
function updateStats(){
  let km=distance/1000;
  let min=(Date.now()-startTime)/60000;
  let pace=km?(min/km).toFixed(2):0;

  document.getElementById("stats").innerText =
    `Pace ${pace} | ${km.toFixed(2)} km`;
}

// -------- DISTANCE --------
function getDistance(a,b){
  const R=6371e3;
  const toRad=x=>x*Math.PI/180;

  let dLat=toRad(b[0]-a[0]);
  let dLon=toRad(b[1]-a[1]);

  let x=Math.sin(dLat/2)**2+
        Math.cos(toRad(a[0]))*
        Math.cos(toRad(b[0]))*
        Math.sin(dLon/2)**2;

  return 2*R*Math.asin(Math.sqrt(x));
}

</script>

</body>
</html>
